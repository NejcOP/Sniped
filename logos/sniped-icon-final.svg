<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sniped Icon</title>
<desc>Sniped standalone icon — yellow on dark navy</desc>

<rect width="200" height="200" fill="#0f1623" rx="44"/>
<rect x="4" y="4" width="192" height="192" rx="40" fill="none" stroke="#1e2d47" stroke-width="2"/>

<!-- Yellow inner bg -->
<rect x="24" y="24" width="152" height="152" rx="28" fill="#f5c518"/>
<rect x="27" y="27" width="146" height="146" rx="25" fill="none" stroke="#d4a800" stroke-width="1.5"/>

<!-- Outer ring -->
<circle cx="100" cy="100" r="46" fill="none" stroke="#0f1623" stroke-width="3.5"/>
<!-- Inner ring -->
<circle cx="100" cy="100" r="26" fill="none" stroke="#0f1623" stroke-width="2.5"/>
<!-- Center dot -->
<circle cx="100" cy="100" r="6.5" fill="#0f1623"/>

<!-- Main crosshair -->
<line x1="100" y1="54" x2="100" y2="67" stroke="#0f1623" stroke-width="3.5" stroke-linecap="round"/>
<line x1="100" y1="133" x2="100" y2="146" stroke="#0f1623" stroke-width="3.5" stroke-linecap="round"/>
<line x1="54" y1="100" x2="67" y2="100" stroke="#0f1623" stroke-width="3.5" stroke-linecap="round"/>
<line x1="133" y1="100" x2="146" y2="100" stroke="#0f1623" stroke-width="3.5" stroke-linecap="round"/>

<!-- Outer ticks -->
<line x1="100" y1="42" x2="100" y2="46" stroke="#0f1623" stroke-width="2" stroke-linecap="round"/>
<line x1="100" y1="154" x2="100" y2="158" stroke="#0f1623" stroke-width="2" stroke-linecap="round"/>
<line x1="42" y1="100" x2="46" y2="100" stroke="#0f1623" stroke-width="2" stroke-linecap="round"/>
<line x1="154" y1="100" x2="158" y2="100" stroke="#0f1623" stroke-width="2" stroke-linecap="round"/>

<!-- Badge -->
<rect x="138" y="38" width="22" height="22" rx="5" fill="#0f1623"/>
<text x="149" y="53.5" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#f5c518">+</text>

</svg>
